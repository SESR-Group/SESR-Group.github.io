- title: Biofuel Powered Glucose Detection
  subtitle: Autonomous glucose detection and power generation from bodily fluids using an n-type conjugated polymer
  group: featured
  image: https://media.springernature.com/w440/springer-static/cover-hires/journal/41563/18/12
  link: https://www.nature.com/articles/s41563-019-0556-4
  description: Integration of an n-type conjugated polymer with a redox enzyme for glucose detection and power generation. The sensor, an enzyme-coupled organic electrochemical transistor, shows a detection range of six orders of magnitude. This polymer is also used in an enzymatic fuel cell to convert glucose and oxygen into electrical power.
  tags:
    - Biofuels
    - Glucose Detection

- title: Water Stable Molecular n-Doping
  subtitle: Enhancing organic electrochemical transistors with high transconductance and stability
  group: featured
  image: https://jaspershen.github.io/journal_referee/nature_communications/featured.png
  link: https://www.nature.com/articles/s41467-020-16648-0
  description: Demonstration of water-stable n-doping in electron transporting organic electrochemical transistors. The doping enhances transconductance, channel capacitance, and mobility, with improved operational and shelf-life stability.
  tags:
    - Organic Electronics
    - Electrochemical Transistors

- title: High Energy Efficiency and Stability for Photoassisted Lithium–Iodine Redox Batteries
  subtitle: Integrating hematite photoelectrodes for improved energy storage
  group: featured
  image: https://pubs.acs.org/cms/10.1021/aelccp.2016.1.issue-4/asset/158da484-1415-da48-d141-8da484d14158/aelccp.2016.1.issue-4.largecover.jpg
  link: https://pubs.acs.org/doi/10.1021/acsenergylett.6b00359
  description: Demonstration of photoassisted lithium–iodine (Li–I2) redox cells with hematite photoelectrodes, achieving high energy efficiency (∼95.4%) and stability over 600 hours of cycling.
  tags:
    - Lithium–Iodine Batteries
    - Energy Efficiency


